<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>هدية الى ليلي</title>
  <link rel="stylesheet" href="themes/بلاك%20هول/style.css">

<style>
        /* Preview Banner */
        .preview-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 12px 50px 12px 20px;
            font-weight: bold;
            z-index: 9999;
            font-size: 14px;
            animation: slideDown 0.4s ease-out;
            font-family: 'Arial', sans-serif;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        .preview-banner-text {
            display: inline-block;
            max-width: calc(100% - 60px);
            line-height: 1.4;
        }

        .preview-banner-close {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.25);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-banner-close:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-50%) rotate(90deg);
        }

        body.preview-active {
            padding-top: 50px;
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .preview-banner {
                font-size: 12px;
                padding: 10px 45px 10px 15px;
            }
            
            body.preview-active {
                padding-top: 45px;
            }
        }

        @media (max-width: 400px) {
            .preview-banner {
                font-size: 10px;
                padding: 8px 40px 8px 12px;
            }
            
            body.preview-active {
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>
<div class="preview-banner" id="previewBanner">
        <span class="preview-banner-text">
            <strong>وضع المعاينة:</strong> هذا رابط معاينة فقط. تواصل مع متجرنا لإنشاء رابط شخصي لحبيبك!
        </span>
        <button class="preview-banner-close" onclick="closePreviewBanner()" aria-label="إغلاق">×</button>
    </div>

<div class="experience"></div>
<!-- bottom overlayed animated heading -->
<div class="love-overlay" aria-hidden="true">
  <h1>ليلي</h1>
</div>
<script  src="themes/بلاك%20هول/script.js"></script>

<!--

<script>
        function closePreviewBanner() {
            const banner = document.getElementById('previewBanner');
            banner.style.animation = 'slideUp 0.3s ease-in';
            
            setTimeout(() => {
                banner.style.display = 'none';
                document.body.classList.remove('preview-active');
            }, 300);
        }

        // Always show the banner on page load
        window.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('preview-active');
        });

        // Optional: Close on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePreviewBanner();
            }
        });
    </script>
</body>
</html>
